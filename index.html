<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEC Committee Onboarding — Charter Comprehension</title>
<style>
  :root{
    --ink:#1c1812;
    --paper:#f7f3ea;
    --paper-raised:#fffdf8;
    --amber:#c2761c;
    --amber-deep:#8a4e0f;
    --amber-pale:#f0dcb8;
    --line:#e2d7bf;
    --green:#3f6b4a;
    --red:#a13c2f;
    --muted:#7a7163;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --serif: 'Source Serif 4', Georgia, serif;
    --sans: 'Inter', -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(28,24,18,0.035) 1px, transparent 0);
    background-size:22px 22px;
    pointer-events:none;
    z-index:0;
  }
  #app{position:relative; z-index:1; min-height:100vh;}

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 28px;
    border-bottom:1px solid var(--line);
    background:var(--paper-raised);
    position:sticky; top:0; z-index:50;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-mark{
    width:34px; height:34px; border-radius:50%;
    background:
      radial-gradient(circle at 35% 30%, var(--amber-pale), var(--amber) 55%, var(--amber-deep) 100%);
    position:relative;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
  }
  .brand-mark::after{
    content:"";
    position:absolute; inset:8px;
    border-radius:50%;
    border:1.5px solid rgba(255,255,255,0.55);
  }
  .brand-text .name{font-family:var(--serif); font-weight:600; font-size:15px; letter-spacing:0.01em;}
  .brand-text .sub{font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase;}
  .top-right{display:flex; align-items:center; gap:14px; font-family:var(--mono); font-size:11px; color:var(--muted);}
  .pill{
    padding:4px 10px; border-radius:20px; border:1px solid var(--line);
    background:var(--paper); font-size:11px;
  }
  .btn{
    font-family:var(--sans); font-weight:600; font-size:13px;
    border:none; cursor:pointer; border-radius:8px;
    padding:10px 18px; transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--ink); color:var(--paper-raised);}
  .btn-primary:hover{box-shadow:0 4px 14px rgba(28,24,18,0.25);}
  .btn-primary:disabled{background:#cfc6b3; color:#8a8270; cursor:not-allowed; box-shadow:none;}
  .btn-ghost{background:transparent; color:var(--ink); border:1px solid var(--line);}
  .btn-ghost:hover{border-color:var(--ink);}
  .btn-sm{padding:6px 12px; font-size:12px;}

  /* ---------- Login ---------- */
  .login-wrap{
    min-height:calc(100vh - 71px);
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .login-card{
    width:100%; max-width:420px;
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:18px;
    padding:40px 36px;
    box-shadow:0 24px 60px -20px rgba(28,24,18,0.18);
  }
  .login-eyebrow{
    font-family:var(--mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--amber-deep); margin-bottom:10px; font-weight:600;
  }
  .login-card h1{
    font-family:var(--serif); font-size:28px; line-height:1.15; margin:0 0 8px;
    font-weight:600;
  }
  .login-card p.desc{color:var(--muted); font-size:14px; line-height:1.5; margin:0 0 28px;}
  .field{margin-bottom:16px;}
  .field label{
    display:block; font-size:12px; font-weight:600; margin-bottom:6px; color:var(--ink);
    font-family:var(--mono); letter-spacing:0.03em; text-transform:uppercase; font-size:10.5px;
  }
  .field input, .field select{
    width:100%; padding:12px 14px; border-radius:9px;
    border:1.5px solid var(--line); background:var(--paper);
    font-family:var(--sans); font-size:14px; color:var(--ink);
    outline:none; transition:border-color .15s ease;
  }
  .field input:focus, .field select:focus{border-color:var(--amber);}
  .login-error{
    background:#fbeae6; border:1px solid #e7c3ba; color:var(--red);
    font-size:13px; padding:10px 12px; border-radius:8px; margin-bottom:16px;
    display:none;
  }
  .login-card .btn-primary{width:100%; padding:13px; font-size:14px; margin-top:6px;}
  .admin-toggle{
    text-align:center; margin-top:18px; font-size:12px; color:var(--muted); cursor:pointer;
    text-decoration:underline; text-underline-offset:3px;
  }

  /* ---------- Layout: dashboard + reader ---------- */
  .shell{display:flex; min-height:calc(100vh - 71px);}
  .sidebar{
    width:290px; flex-shrink:0;
    border-right:1px solid var(--line);
    background:var(--paper-raised);
    padding:24px 0;
    overflow-y:auto;
  }
  .sidebar-header{padding:0 22px 18px; border-bottom:1px solid var(--line); margin-bottom:6px;}
  .sidebar-header .greeting{font-family:var(--serif); font-size:17px; font-weight:600;}
  .progress-track{
    height:6px; background:var(--line); border-radius:4px; margin-top:12px; overflow:hidden;
  }
  .progress-fill{height:100%; background:linear-gradient(90deg, var(--amber-deep), var(--amber)); border-radius:4px; transition:width .4s ease;}
  .progress-label{font-family:var(--mono); font-size:10.5px; color:var(--muted); margin-top:7px;}

  .sec-list{list-style:none; margin:0; padding:8px 12px;}
  .sec-item{
    display:flex; align-items:center; gap:10px;
    padding:11px 12px; border-radius:9px; cursor:pointer;
    margin-bottom:2px; transition:background .12s ease;
  }
  .sec-item:hover{background:var(--amber-pale);}
  .sec-item.active{background:var(--ink); }
  .sec-item.active .sec-title, .sec-item.active .sec-status{color:var(--paper-raised);}
  .sec-status-dot{
    width:9px; height:9px; border-radius:50%; flex-shrink:0;
    border:1.5px solid var(--muted);
  }
  .sec-status-dot.done{background:var(--green); border-color:var(--green);}
  .sec-status-dot.locked{background:var(--line); border-color:var(--line);}
  .sec-title{font-size:13px; font-weight:500; line-height:1.3;}
  .sec-status{font-family:var(--mono); font-size:9.5px; color:var(--muted); margin-top:2px; display:block;}

  .main{flex:1; padding:36px 48px; max-width:840px; margin:0 auto; width:100%;}

  /* ---------- Reader ---------- */
  .reader-eyebrow{
    font-family:var(--mono); font-size:11px; color:var(--amber-deep); font-weight:600;
    letter-spacing:0.1em; text-transform:uppercase; margin-bottom:10px;
  }
  .reader h1{font-family:var(--serif); font-size:32px; margin:0 0 22px; line-height:1.2;}
  .reader-body{
    background:var(--paper-raised); border:1px solid var(--line); border-radius:14px;
    padding:32px 34px; font-size:15.5px; line-height:1.75; color:#2b251c;
  }
  .reader-body p{margin:0 0 16px;}
  .clause-block{
    padding:18px 0; border-bottom:1px solid var(--line);
  }
  .clause-block:first-child{padding-top:0;}
  .clause-block:last-child{border-bottom:none; padding-bottom:0;}
  .clause-label{
    font-family:var(--mono); font-size:11.5px; font-weight:700; letter-spacing:0.04em;
    text-transform:uppercase; color:var(--amber-deep); margin-bottom:10px;
  }
  .clause-block p{margin:0 0 12px; white-space:pre-line;}
  .clause-block p:last-child{margin-bottom:0;}
  .gate-banner{
    margin-top:18px; display:flex; align-items:center; justify-content:space-between;
    background:var(--amber-pale); border:1px solid var(--amber); border-radius:10px;
    padding:14px 18px; font-size:13px;
  }
  .gate-banner .timer{font-family:var(--mono); font-weight:700; color:var(--amber-deep);}
  .reader-actions{margin-top:24px; display:flex; gap:12px;}

  /* ---------- Quiz ---------- */
  .quiz-progress{font-family:var(--mono); font-size:11px; color:var(--muted); margin-bottom:14px;}
  .q-card{
    background:var(--paper-raised); border:1px solid var(--line); border-radius:14px;
    padding:30px 32px; margin-bottom:18px;
  }
  .q-text{font-size:16px; font-weight:600; line-height:1.5; margin:0 0 20px;}
  .opt{
    display:flex; align-items:flex-start; gap:12px;
    border:1.5px solid var(--line); border-radius:10px;
    padding:13px 16px; margin-bottom:10px; cursor:pointer;
    transition:border-color .12s ease, background .12s ease;
    font-size:14px; line-height:1.5;
  }
  .opt:hover{border-color:var(--amber);}
  .opt.selected{border-color:var(--amber); background:var(--amber-pale);}
  .opt.correct{border-color:var(--green); background:#e7f0e9;}
  .opt.incorrect{border-color:var(--red); background:#fbeae6;}
  .opt-letter{
    font-family:var(--mono); font-weight:700; font-size:12px;
    width:22px; height:22px; border-radius:50%; border:1.5px solid var(--line);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .opt.selected .opt-letter{border-color:var(--amber); background:var(--amber);  color:#fff;}
  .opt.correct .opt-letter{border-color:var(--green); background:var(--green); color:#fff;}
  .opt.incorrect .opt-letter{border-color:var(--red); background:var(--red); color:#fff;}
  .explain{
    margin-top:14px; padding:13px 16px; border-radius:9px; font-size:13.5px; line-height:1.6;
    display:none;
  }
  .explain.show{display:block;}
  .explain.right{background:#e7f0e9; color:#2c4a35; border:1px solid #bcd6c2;}
  .explain.wrong{background:#fbeae6; color:#7a2c20; border:1px solid #e7c3ba;}

  .result-banner{
    text-align:center; padding:40px 30px;
    background:var(--paper-raised); border-radius:16px; border:1px solid var(--line);
  }
  .result-score{font-family:var(--serif); font-size:48px; font-weight:700; margin:6px 0;}
  .result-pass{color:var(--green);}
  .result-fail{color:var(--red);}
  .result-msg{font-size:14px; color:var(--muted); max-width:380px; margin:10px auto 24px; line-height:1.6;}

  /* ---------- Completion ---------- */
  .complete-wrap{text-align:center; padding:60px 20px;}
  .complete-wrap h1{font-family:var(--serif); font-size:34px; margin-bottom:10px;}
  .complete-wrap p{color:var(--muted); max-width:420px; margin:0 auto 28px;}

  /* ---------- Admin ---------- */
  .admin-main{padding:36px 48px; max-width:1180px; margin:0 auto;}
  .admin-header{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:28px; flex-wrap:wrap; gap:16px;}
  .admin-header h1{font-family:var(--serif); font-size:30px; margin:0;}
  .stat-row{display:flex; gap:16px; margin-bottom:28px; flex-wrap:wrap;}
  .stat-card{
    background:var(--paper-raised); border:1px solid var(--line); border-radius:12px;
    padding:18px 22px; min-width:140px; flex:1;
  }
  .stat-num{font-family:var(--serif); font-size:28px; font-weight:700;}
  .stat-label{font-family:var(--mono); font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-top:4px;}

  .table-wrap{background:var(--paper-raised); border:1px solid var(--line); border-radius:14px; overflow:hidden;}
  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{
    text-align:left; padding:13px 16px; font-family:var(--mono); font-size:10.5px;
    text-transform:uppercase; letter-spacing:0.05em; color:var(--muted);
    border-bottom:1px solid var(--line); background:var(--paper);
  }
  td{padding:13px 16px; border-bottom:1px solid var(--line); vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr.member-row{cursor:pointer; transition:background .1s ease;}
  tr.member-row:hover{background:var(--amber-pale);}
  .status-chip{
    font-family:var(--mono); font-size:10px; padding:3px 9px; border-radius:20px;
    font-weight:700; letter-spacing:0.02em;
  }
  .status-chip.complete{background:#e7f0e9; color:var(--green);}
  .status-chip.progress{background:var(--amber-pale); color:var(--amber-deep);}
  .status-chip.stuck{background:#fbeae6; color:var(--red);}
  .mini-bar{width:80px; height:5px; background:var(--line); border-radius:3px; overflow:hidden; display:inline-block; vertical-align:middle; margin-right:8px;}
  .mini-bar-fill{height:100%; background:var(--amber);}

  .detail-panel{
    position:fixed; top:0; right:0; bottom:0; width:440px; max-width:92vw;
    background:var(--paper-raised); border-left:1px solid var(--line);
    box-shadow:-20px 0 50px -20px rgba(0,0,0,0.25);
    transform:translateX(100%); transition:transform .25s ease;
    z-index:100; overflow-y:auto; padding:28px;
  }
  .detail-panel.open{transform:translateX(0);}
  .detail-overlay{
    position:fixed; inset:0; background:rgba(28,24,18,0.25); z-index:99;
    opacity:0; pointer-events:none; transition:opacity .25s ease;
  }
  .detail-overlay.open{opacity:1; pointer-events:auto;}
  .detail-close{cursor:pointer; font-family:var(--mono); font-size:12px; color:var(--muted);}
  .detail-top-row{display:flex; justify-content:space-between; align-items:center;}
  .btn-delete-detail{
    font-family:var(--mono); font-size:11px; color:var(--red); background:transparent;
    border:1px solid #e7c3ba; border-radius:7px; padding:6px 12px; cursor:pointer;
    transition:background .12s ease;
  }
  .btn-delete-detail:hover{background:#fbeae6;}
  .btn-delete-row{
    width:26px; height:26px; border-radius:7px; border:1px solid var(--line);
    background:transparent; color:var(--muted); cursor:pointer; font-size:13px;
    display:flex; align-items:center; justify-content:center; transition:all .12s ease;
  }
  .btn-delete-row:hover{background:#fbeae6; border-color:#e7c3ba; color:var(--red);}
  .detail-name{font-family:var(--serif); font-size:24px; margin:14px 0 4px;}
  .detail-email{font-family:var(--mono); font-size:12px; color:var(--muted); margin-bottom:24px;}
  .detail-sec{
    border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:10px;
  }
  .detail-sec-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
  .detail-sec-title{font-size:13px; font-weight:600;}
  .detail-meta{font-family:var(--mono); font-size:11px; color:var(--muted); display:flex; gap:14px; flex-wrap:wrap;}

  @media (max-width: 880px){
    .shell{flex-direction:column;}
    .sidebar{width:100%; border-right:none; border-bottom:1px solid var(--line);}
    .main{padding:24px 18px;}
    .admin-main{padding:24px 18px;}
    .reader-body{padding:22px;}
  }

  .hidden{display:none !important;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =========================================================
   SEC CHARTER ONBOARDING PORTAL
   Single-file build. Storage via Google Sheets + Apps Script backend (persistent, free).
   See apps-script-backend.gs for the 5-minute Google Sheets setup.
   No external APIs. All grading is hardcoded.
   ========================================================= */

const CLUB_PASSWORD = "SECMEMBER"; // shared club password — change as needed
const PASS_THRESHOLD = 0.8; // 80% to pass a section quiz
const MIN_READ_SECONDS = 35; // minimum time before quiz unlocks per section

// ---------------- Question bank ----------------
// SEC Charter Onboarding — Question Bank
// Scenario-based comprehension checks. Each question tests application of a rule,
// not recall of a definition. Distractors are plausible misreadings of the clause.

const SECTIONS = [
  {
    id: "definitions",
    title: "Part 0 — Definitions & Role Codes",
    clauses: [
      {label: "Committee member", text: "Any individual holding a named role within the Club's committee structure, including ExCo, departmental officers, and Control & Support Officers."},
      {label: "ExCo / Executive Committee", text: "The President (R-01) and four Vice Presidents (R-02 through R-05), collectively forming the Club's executive leadership."},
      {label: "President (R-01)", text: "The ExCo member designated as President for the term, serving as the Club's official representative and final escalation authority. The President permanently holds the Brand & Content portfolio (R-02) directly, in the same manner the Treasurer Function (R-09) is permanently embedded under the VP, Events (R-05) — see clause 4.4.1."},
      {label: "Vice President (R-02–R-05)", text: "One of four portfolio leads forming the Executive Committee, each owning a defined domain. Current titles and portfolios are listed in Appendix A1. The Brand & Content portfolio (R-02) is permanently held by the President rather than independently assigned each term; R-03 through R-05 are independently assigned."},
      {label: "Secretary (R-06)", text: "A standalone Control & Support Officer supporting all VP portfolios. Not embedded in any single VP domain. Operates under the strategic direction of R-01."},
      {label: "Vice Secretary (R-07)", text: "The officer assisting the Secretary (R-06) in meeting minutes, documentation systems, records management, governance tracking, and administrative follow-up."},
      {label: "Treasurer (R-09)", text: "The officer holding the Treasurer Function, embedded operationally under R-05. Responsible for budget control, financial records, and all treasurer-related functions."},
      {label: "Vice Treasurer (R-10)", text: "The officer assisting the Treasurer (R-09) in financial records, receipts, reconciliations, reimbursement tracking, budget files, and financial documentation."},
      {label: "Club Auditor (R-08)", text: "An independent standalone Control & Support Officer responsible for reviewing account security, AI usage, financial documentation, reconciliation work, task tracking, and governance compliance. Reports to R-01 and ExCo. Retains full independence on audit findings."},
      {label: "AWI Officer (R-11)", text: "AI & Web Innovation Officer. A standalone Control & Support Officer responsible for Club technology infrastructure, digital tools, web presence, and AI systems. Operates under the strategic direction of R-01 and provides operational support across all VP portfolios."},
      {label: "Role Code (R-##)", text: "A permanent identifier assigned to each committee role. Codes do not change when role titles are renamed. See Appendix A1 for current title mapping."},
      {label: "Unauthorised Person", text: "Any individual not formally permitted to access specific Club information, documents, discussions, records, decisions, or communication channels under this Charter."}
    ],
    questions: [
      {
        q: "Next term, the role title \"AWI Officer\" gets renamed to \"Head of Tech.\" What needs to happen to the Charter?",
        options: [
          "Nothing in the governance clauses changes — only Appendix A1 is updated to reflect the new title against R-11",
          "An EGM must be called to formally amend the Charter",
          "The role code R-11 changes to match the new title",
          "Every clause referencing R-11 must be manually rewritten"
        ],
        correct: 0,
        explain: "Role codes are permanent; only titles change. Appendix A1 updates are explicitly excluded from requiring EGM amendment, as long as no new authority is created."
      },
      {
        q: "A new committee member assumes the President automatically controls the Brand & Content department's day-to-day decisions because the portfolio is 'permanently embedded' under R-01. Is this correct?",
        options: [
          "Yes — permanent embedding means full operational control",
          "No — embedding describes ownership structure (like R-09 under R-05), it doesn't override the general rule that VPs decide independently within their domains",
          "Only if no Vice President objects",
          "Yes, but only during the first 30 days of term"
        ],
        correct: 1,
        explain: "Embedding is a structural/ownership concept (clause 4.4.1), not an override of the Collective Executive Mode default in 4.4.2 — decisions are still made at the lowest appropriate level."
      }
    ]
  },
  {
    id: "club-info",
    title: "Part 1 — Club Information, Vision & Objectives",
    clauses: [
      {label: "1.2 Vision", text: "To be Sunway University's leading entrepreneurship ecosystem — a self-sustaining platform of digital authority, owned community, and proven execution that produces operators, not just members, and that strengthens with every committee handover rather than resetting to zero."},
      {label: "1.3 Mission", text: "To build a community of aspiring entrepreneurs and innovators, fostering real-world skills, professional connections, and opportunities beyond campus to help members turn their ideas into reality and become future business leaders."},
      {label: "1.4 Objectives", text: "Develop Operators, Not Just Members: Equip students with practical skills, creative thinking, and entrepreneurial values through curated training, mentorship, and hands-on projects.\n\nBuild Digital Authority: Establish SEC's social presence as a credibility platform that reaches strangers and sponsors, not just existing members — the entry point to the SEC flywheel.\n\nBuild Owned Community Infrastructure: Grow Sunway Nexus by SEC into a warm, owned audience that reduces SEC's dependence on cold outreach for attendance and recruitment.\n\nRun an Activation Platform: Deliver events that function as a proof layer — documented, repeatable, content-producing — converting digital authority into physical credibility rather than one-off activity.\n\nBuild Institutional Assets: Maintain the D-01–D-07 document system and Notion infrastructure so each incoming committee inherits a working system, not a blank slate.\n\nProvide Real-World Pathways: Create internship, training, and working-experience pathways for members within Sunway Education Group and industry partners."},
      {label: "1.5 Powers", text: "The Club has the same powers as an individual, subject to this Charter. The Club may exercise those powers and use its income and assets only for the purposes set out in its Vision, Mission, and Objectives, and in accordance with University, Student LIFE, and SUSC/SCC requirements."}
    ],
    questions: [
      {
        q: "A committee member wants to use Club funds to sponsor an unrelated personal side-project because 'it'll bring good PR to SEC eventually.' Per clause 1.5, is this permitted?",
        options: [
          "Yes, as long as R-01 approves it personally",
          "No — Club powers and assets may only be used for purposes set out in the Vision, Mission, and Objectives, and in line with University/Student LIFE rules",
          "Yes, since indirect PR benefit counts as advancing the mission",
          "Only the Treasurer can decide this, no other approval needed"
        ],
        correct: 1,
        explain: "Clause 1.5 restricts use of Club powers/income/assets strictly to the stated Vision, Mission, and Objectives — vague indirect benefit doesn't qualify, and no single officer can waive this."
      },
      {
        q: "Why does the Charter specifically mention maintaining 'institutional assets' like the D-01–D-07 document system as an objective?",
        options: [
          "To satisfy a Student LIFE paperwork requirement only",
          "So each incoming committee inherits a working system rather than starting from a blank slate — continuity is a stated objective, not just an afterthought",
          "Because external sponsors require it",
          "It's optional and only matters if the outgoing committee has time"
        ],
        correct: 1,
        explain: "This directly reflects the Vision's emphasis on strengthening with every handover rather than resetting to zero — it's a core objective, not a compliance checkbox."
      }
    ]
  },
  {
    id: "membership",
    title: "Part 2 — Membership Tiers & Data Handling",

  view: "login", // login | reader | quiz | result | complete | admin
  isAdmin: false,
  user: null, // {name, email}
  activeSectionId: null,
  readStart: null,
  quizStart: null,
  readTimerInterval: null,
  quizAnswers: {}, // qIndex -> selected option index
  quizSubmitted: false,
  detailOpenFor: null
};

let progress = null; // loaded per-user progress object

// ---------------- Storage backend: Google Sheets via Apps Script ----------------
// PASTE YOUR DEPLOYED APPS SCRIPT WEB APP URL HERE (see apps-script-backend.gs for setup):
const SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbwok--dAjt9WFn9xCGGk3jl-vkGyzuxeWPuYcKyhdAxLzQMhYTMiq7pPrLlUNLu0qKssA/exec";

function localCacheKey(email){ return "sec_onboard_cache:" + email.toLowerCase().trim(); }

function backendConfigured(){
  return SHEETS_API_URL && SHEETS_API_URL.indexOf("https://script.google.com") === 0;
}

async function loadProgress(email){
  const fresh = {
    name: "", email: email,
    sections: {},
    startedAt: Date.now(),
    lastActive: Date.now()
  };

  if(!backendConfigured()){
    showSetupWarning();
    try{ const cached = localStorage.getItem(localCacheKey(email)); if(cached) return JSON.parse(cached); }catch(e){}
    return fresh;
  }

  try{
    const res = await fetch(`${SHEETS_API_URL}?action=load&email=${encodeURIComponent(email)}`);
    const json = await res.json();
    if(json.found && json.data){
      try{ localStorage.setItem(localCacheKey(email), JSON.stringify(json.data)); }catch(e){}
      return json.data;
    }
  }catch(e){
    console.error("load failed:", e);
    try{ const c = localStorage.getItem(localCacheKey(email)); if(c) return JSON.parse(c); }catch(e2){}
  }
  return fresh;
}

// Trims attempt history so the stored payload never grows unbounded.
function trimForStorage(p){
  const clone = JSON.parse(JSON.stringify(p));
  Object.keys(clone.sections).forEach(secId => {
    const sp = clone.sections[secId];
    if(sp.attempts && sp.attempts.length > 5){
      const kept = [sp.attempts[0], ...sp.attempts.slice(-4)];
      sp.attempts = kept;
    }
    sp.attempts && sp.attempts.forEach(a => { delete a.answers; });
  });
  return clone;
}

async function saveProgress(){
  progress.lastActive = Date.now();
  const trimmed = trimForStorage(progress);

  // always write to local cache immediately
  try{ localStorage.setItem(localCacheKey(progress.email), JSON.stringify(trimmed)); }catch(e){}

  if(!backendConfigured()){ showSetupWarning(); return false; }

  try{
    const payload = encodeURIComponent(JSON.stringify({ email: progress.email, name: progress.name, data: trimmed }));
    const res = await fetch(`${SHEETS_API_URL}?action=save&payload=${payload}`);
    const json = await res.json();
    if(json.success){ hideSaveError(); return true; }
    throw new Error(json.error || "save failed");
  }catch(e){
    console.error("save failed:", e);
    showSaveError();
    return false;
  }
}

// Posts data to Apps Script via a hidden iframe form — bypasses CORS completely

function showSaveError(){
  let banner = document.getElementById("saveErrorBanner");
  if(!banner){
    banner = document.createElement("div");
    banner.id = "saveErrorBanner";
    banner.style.cssText = "position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:#a13c2f; color:#fff; padding:12px 20px; border-radius:10px; font-family:Inter,sans-serif; font-size:13px; z-index:999; box-shadow:0 10px 30px rgba(0,0,0,0.25); max-width:90vw; text-align:center;";
    document.body.appendChild(banner);
  }
  banner.textContent = "Couldn't sync to the server — your progress is saved on this device and will sync once you're back online.";
  banner.style.display = "block";
}
function hideSaveError(){
  const banner = document.getElementById("saveErrorBanner");
  if(banner) banner.style.display = "none";
}
function showSetupWarning(){
  let banner = document.getElementById("setupWarnBanner");
  if(!banner){
    banner = document.createElement("div");
    banner.id = "setupWarnBanner";
    banner.style.cssText = "position:fixed; top:0; left:0; right:0; background:#8a4e0f; color:#fff; padding:9px 16px; font-family:'JetBrains Mono',monospace; font-size:11.5px; z-index:1000; text-align:center;";
    document.body.appendChild(banner);
  }
  banner.textContent = "⚠ Admin setup incomplete: SHEETS_API_URL not configured. Progress is only saving locally on this device. See apps-script-backend.gs for setup steps.";
}

async function getAllProgress(){
  if(!backendConfigured()) return [];
  try{
    const res = await fetch(`${SHEETS_API_URL}?action=loadAll`);
    const json = await res.json();
    return json.members || [];
  }catch(e){
    console.error("loadAll failed:", e);
    return [];
  }
}

async function deleteMember(email){
  if(!backendConfigured()) return false;
  try{
    const res = await fetch(`${SHEETS_API_URL}?action=delete&email=${encodeURIComponent(email)}`);
    const json = await res.json();
    return !!json.success;
  }catch(e){
    console.error("delete failed:", e);
    return false;
  }
}

// ---------------- Utility ----------------
function fmtTime(sec){
  if(sec < 60) return sec + "s";
  const m = Math.floor(sec/60), s = sec%60;
  return m + "m " + s + "s";
}
function fmtDate(ts){
  const d = new Date(ts);
  return d.toLocaleDateString(undefined,{month:"short", day:"numeric"}) + " · " + d.toLocaleTimeString(undefined,{hour:"2-digit", minute:"2-digit"});
}
function sectionStatus(secId){
  const s = progress.sections[secId];
  if(!s) return "locked-or-new";
  return s.status; // "complete" | "in-progress"
}
function completedCount(){
  return SECTIONS.filter(s => progress.sections[s.id] && progress.sections[s.id].status === "complete").length;
}
function overallPercent(){
  return Math.round((completedCount() / SECTIONS.length) * 100);
}
function nextIncompleteSection(){
  return SECTIONS.find(s => !(progress.sections[s.id] && progress.sections[s.id].status === "complete"));
}

// ---------------- Render root ----------------
function render(){
  const app = document.getElementById("app");
  if(state.view === "login"){ app.innerHTML = renderLogin(); attachLoginEvents(); return; }
  if(state.view === "admin"){ app.innerHTML = renderAdminShell(); attachAdminEvents(); renderAdminBody(); return; }

  // member views share topbar + sidebar shell
  app.innerHTML = renderTopbar() + `<div class="shell">${renderSidebar()}<div class="main">${renderMainBody()}</div></div>`;
  attachMemberEvents();
}

async function handleLogin(){
  const name = document.getElementById("inName").value.trim();
  const email = document.getElementById("inEmail").value.trim();
  const pass = document.getElementById("inPass").value;
  const errBox = document.getElementById("loginError");
  const btn = document.getElementById("loginBtn");

  if(!name || !email || !pass){
    errBox.textContent = "Fill in all fields to continue.";
    errBox.style.display = "block";
    return;
  }
  if(pass !== CLUB_PASSWORD){
    errBox.textContent = "Incorrect club password. Check with your VP or R-06.";
    errBox.style.display = "block";
    return;
  }
  errBox.style.display = "none";
  btn.disabled = true;
  btn.textContent = "Loading your progress...";

  try{
    progress = await loadProgress(email);
    progress.name = name;
    progress.email = email;

    state.user = {name, email};
    const next = nextIncompleteSection();
    state.activeSectionId = next ? next.id : SECTIONS[0].id;
    state.view = completedCount() === SECTIONS.length ? "complete" : "reader";
    render(); // enter the app immediately — don't block on the sync below

    saveProgress(); // fire-and-forget in the background; local cache already has this data
  }catch(e){
    console.error("login failed:", e);
    btn.disabled = false;
    btn.textContent = "Enter the portal";
    errBox.textContent = "Something went wrong loading your progress. Try again — if it persists, check your internet connection.";
    errBox.style.display = "block";
  }
}

// ================= SIDEBAR =================
function renderSidebar(){
  const pct = overallPercent();
  let items = "";
  SECTIONS.forEach((s, idx) => {
    const st = progress.sections[s.id];
    const status = st ? st.status : "new";
    const dotClass = status === "complete" ? "done" : "";
    const isActive = s.id === state.activeSectionId && (state.view === "reader" || state.view === "quiz" || state.view === "result");
    const label = status === "complete" ? `Passed · ${st.bestScore}/${s.questions.length}` : (status === "in-progress" ? `In progress · ${st.attempts ? st.attempts.length : 0} attempt(s)` : "Not started");
    items += `
      <li class="sec-item ${isActive ? "active" : ""}" data-secid="${s.id}">
        <div class="sec-status-dot ${dotClass}"></div>
        <div>
          <div class="sec-title">${s.title}</div>
          <span class="sec-status">${label}</span>
        </div>
      </li>`;
  });
  return `
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="greeting">Your progress</div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${completedCount()} of ${SECTIONS.length} sections passed · ${pct}%</div>
    </div>
    <ul class="sec-list">${items}</ul>
  </div>`;
}

// ================= MAIN BODY ROUTER =================
function renderMainBody(){
  if(state.view === "reader") return renderReader();
  if(state.view === "quiz") return renderQuiz();
  if(state.view === "result") return renderResult();
  if(state.view === "complete") return renderComplete();
  return "";
}

// ---------------- Reader ----------------
function renderReader(){
  const sec = SECTIONS.find(s => s.id === state.activeSectionId);
  const st = progress.sections[sec.id];
  const alreadyPassed = st && st.status === "complete";
  const clausesHtml = sec.clauses.map(c => `
    <div class="clause-block">
      <div class="clause-label">${c.label}</div>
      ${c.text.split("\n\n").map(para => `<p>${escapeHtml(para)}</p>`).join("")}
    </div>`).join("");
  return `
  <div class="reader-eyebrow">Section ${SECTIONS.findIndex(s=>s.id===sec.id)+1} of ${SECTIONS.length} · Verbatim from SEC Charter 2026</div>
  <h1>${sec.title}</h1>
  <div class="reader-body" id="readerBody">
    ${clausesHtml}
  </div>
  <div class="gate-banner" id="gateBanner">
    <span id="gateMsg">Read through the section above. The comprehension check unlocks in <span class="timer" id="gateTimer">${MIN_READ_SECONDS}</span>s.</span>
  </div>
  <div class="reader-actions">
    <button class="btn btn-primary" id="toQuizBtn" disabled>Take comprehension check</button>
    ${alreadyPassed ? `<button class="btn btn-ghost" id="reviewPassBtn">Already passed — view next section</button>` : ""}
  </div>`;
}

function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function attachReaderTimer(){
  let remaining = MIN_READ_SECONDS;
  const st = progress.sections[state.activeSectionId];
  if(st && st.status === "complete"){
    remaining = 0; // no need to re-gate already-passed sections
  }
  const timerEl = document.getElementById("gateTimer");
  const bannerEl = document.getElementById("gateBanner");
  const btn = document.getElementById("toQuizBtn");

  if(remaining <= 0){
    bannerEl.style.display = "none";
    btn.disabled = false;
    return;
  }
  state.readStart = Date.now();
  state.readTimerInterval = setInterval(() => {
    remaining -= 1;
    if(timerEl) timerEl.textContent = remaining;
    if(remaining <= 0){
      clearInterval(state.readTimerInterval);
      bannerEl.querySelector("#gateMsg").innerHTML = "You can now take the comprehension check.";
      btn.disabled = false;
    }
  }, 1000);
}

// ---------------- Quiz ----------------
function renderQuiz(){
  const sec = SECTIONS.find(s => s.id === state.activeSectionId);
  let cards = "";
  sec.questions.forEach((q, qi) => {
    const selected = state.quizAnswers[qi];
    let optsHtml = "";
    q.options.forEach((opt, oi) => {
      let cls = "opt";
      if(state.quizSubmitted){
        if(oi === q.correct) cls += " correct";
        else if(oi === selected) cls += " incorrect";
      } else if(selected === oi){
        cls += " selected";
      }
      const letter = String.fromCharCode(65+oi);
      optsHtml += `<div class="${cls}" data-qi="${qi}" data-oi="${oi}"><div class="opt-letter">${letter}</div><div>${opt}</div></div>`;
    });
    let explainHtml = "";
    if(state.quizSubmitted){
      const wasRight = selected === q.correct;
      explainHtml = `<div class="explain show ${wasRight ? "right":"wrong"}">${wasRight ? "Correct. " : "Not quite. "}${q.explain}</div>`;
    }
    cards += `<div class="q-card"><div class="q-text">${qi+1}. ${q.q}</div>${optsHtml}${explainHtml}</div>`;
  });

  const allAnswered = sec.questions.every((_, qi) => state.quizAnswers[qi] !== undefined);

  return `
  <div class="reader-eyebrow">Comprehension check</div>
  <h1>${sec.title}</h1>
  <div class="quiz-progress">${sec.questions.length} questions · need ${Math.ceil(sec.questions.length * PASS_THRESHOLD)}/${sec.questions.length} correct to pass</div>
  ${cards}
  <div class="reader-actions">
    ${!state.quizSubmitted
      ? `<button class="btn btn-primary" id="submitQuizBtn" ${allAnswered ? "" : "disabled"}>Submit answers</button>`
      : `<button class="btn btn-primary" id="seeResultBtn">See result</button>`}
    <button class="btn btn-ghost" id="backToReaderBtn">Back to reading</button>
  </div>`;
}

// ---------------- Result ----------------
function renderResult(){
  const sec = SECTIONS.find(s => s.id === state.activeSectionId);
  const last = progress.sections[sec.id].attempts.slice(-1)[0];
  const pct = Math.round((last.score / last.total) * 100);
  const passed = pct >= PASS_THRESHOLD * 100;
  const nextSec = nextIncompleteSection();

  return `
  <div class="result-banner">
    <div class="reader-eyebrow" style="text-align:center;">${sec.title}</div>
    <div class="result-score ${passed ? "result-pass":"result-fail"}">${last.score}/${last.total}</div>
    <div style="font-family:var(--mono); font-size:13px; color:var(--muted);">${pct}% · ${passed ? "Passed" : "Below 80% threshold"}</div>
    <div class="result-msg">${passed
      ? "You've demonstrated real understanding of this section. It's marked complete on your progress sidebar."
      : "You'll need to re-read the section and retake the check before this section is marked complete. Take your time with the clauses you missed."}</div>
    <div style="display:flex; gap:12px; justify-content:center;">
      ${passed
        ? (nextSec ? `<button class="btn btn-primary" id="goNextBtn">Continue to next section</button>` : `<button class="btn btn-primary" id="goCompleteBtn">Finish onboarding</button>`)
        : `<button class="btn btn-primary" id="retryBtn">Re-read section</button>`}
    </div>
  </div>`;
}

// ================= EVENT WIRING (member side) =================
function attachMemberEvents(){
  const logoutBtn = document.getElementById("logoutBtn");
  if(logoutBtn) logoutBtn.onclick = () => {
    clearInterval(state.readTimerInterval);
    state = {view:"login", isAdmin:false, user:null, activeSectionId:null, readStart:null, readTimerInterval:null, quizAnswers:{}, quizSubmitted:false, detailOpenFor:null};
    progress = null;
    render();
  };

  document.querySelectorAll(".sec-item").forEach(el => {
    el.onclick = () => {
      clearInterval(state.readTimerInterval);
      state.activeSectionId = el.dataset.secid;
      state.quizAnswers = {};
      state.quizSubmitted = false;
      state.view = "reader";
      render();
    };
  });

  if(state.view === "reader"){
    attachReaderTimer();
    const toQuizBtn = document.getElementById("toQuizBtn");
    if(toQuizBtn) toQuizBtn.onclick = () => {
      clearInterval(state.readTimerInterval);
      state.quizAnswers = {};
      state.quizSubmitted = false;
      state.quizStart = Date.now(); // start timing from when the quiz actually begins, not from reader open
      state.view = "quiz";
      render();
    };
    const reviewPassBtn = document.getElementById("reviewPassBtn");
    if(reviewPassBtn) reviewPassBtn.onclick = () => {
      const next = nextIncompleteSection();
      if(next){ state.activeSectionId = next.id; render(); }
      else { state.view = "complete"; render(); }
    };
  }

  if(state.view === "quiz"){
    document.querySelectorAll(".opt").forEach(el => {
      el.onclick = () => {
        if(state.quizSubmitted) return;
        const qi = parseInt(el.dataset.qi), oi = parseInt(el.dataset.oi);
        state.quizAnswers[qi] = oi;
        render();
      };
    });
    const submitBtn = document.getElementById("submitQuizBtn");
    if(submitBtn) submitBtn.onclick = submitQuiz;
    const seeResultBtn = document.getElementById("seeResultBtn");
    if(seeResultBtn) seeResultBtn.onclick = () => { state.view = "result"; render(); };
    const backBtn = document.getElementById("backToReaderBtn");
    if(backBtn) backBtn.onclick = () => { state.view = "reader"; state.quizAnswers={}; state.quizSubmitted=false; render(); };
  }

  if(state.view === "result"){
    const goNextBtn = document.getElementById("goNextBtn");
    if(goNextBtn) goNextBtn.onclick = () => {
      const next = nextIncompleteSection();
      state.activeSectionId = next.id;
      state.quizAnswers = {}; state.quizSubmitted = false;
      state.view = "reader";
      render();
    };
    const goCompleteBtn = document.getElementById("goCompleteBtn");
    if(goCompleteBtn) goCompleteBtn.onclick = () => { state.view = "complete"; render(); };
    const retryBtn = document.getElementById("retryBtn");
    if(retryBtn) retryBtn.onclick = () => {
      state.quizAnswers = {}; state.quizSubmitted = false;
      state.view = "reader"; render();
    };
  }

  if(state.view === "complete"){
    const reviewBtn = document.getElementById("reviewAgainBtn");
    if(reviewBtn) reviewBtn.onclick = () => {
      state.activeSectionId = SECTIONS[0].id;
      state.view = "reader";
      render();
    };
  }
}

async function submitQuiz(){
  const sec = SECTIONS.find(s => s.id === state.activeSectionId);
  let score = 0;
  sec.questions.forEach((q, qi) => { if(state.quizAnswers[qi] === q.correct) score++; });
  state.quizSubmitted = true;

  const timeSeconds = state.quizStart ? Math.round((Date.now() - state.quizStart)/1000) : 0;
  const passed = (score / sec.questions.length) >= PASS_THRESHOLD;

  if(!progress.sections[sec.id]) progress.sections[sec.id] = {status:"in-progress", attempts:[], bestScore:0, timeSpentSeconds:0};
  const secProg = progress.sections[sec.id];
  secProg.attempts.push({
    ts: Date.now(), score, total: sec.questions.length,
    timeSeconds, answers: {...state.quizAnswers}
  });
  secProg.timeSpentSeconds = (secProg.timeSpentSeconds || 0) + timeSeconds;
  secProg.bestScore = Math.max(secProg.bestScore || 0, score);
  if(passed) secProg.status = "complete";

  await saveProgress();
  render();
}

async function renderAdminBody(){
  const all = await getAllProgress();
  const totalSections = SECTIONS.length;

  const fullyComplete = all.filter(p => SECTIONS.every(s => p.sections[s.id] && p.sections[s.id].status === "complete")).length;
  const inProgress = all.length - fullyComplete;
  let totalAttempts = 0;
  all.forEach(p => SECTIONS.forEach(s => { if(p.sections[s.id]) totalAttempts += (p.sections[s.id].attempts||[]).length; }));

  let rows = "";
  all.sort((a,b) => (b.lastActive||0) - (a.lastActive||0)).forEach(p => {
    const completedSecs = SECTIONS.filter(s => p.sections[s.id] && p.sections[s.id].status === "complete").length;
    const pct = Math.round((completedSecs/totalSections)*100);
    let chip = "progress", chipLabel = "In progress";
    if(completedSecs === totalSections){ chip = "complete"; chipLabel = "Complete"; }
    else if(completedSecs === 0){ chip = "stuck"; chipLabel = "Not started"; }

    let totalTime = 0, totalAtt = 0;
    SECTIONS.forEach(s => { if(p.sections[s.id]){ totalTime += p.sections[s.id].timeSpentSeconds||0; totalAtt += (p.sections[s.id].attempts||[]).length; }});

    rows += `
    <tr class="member-row" data-email="${p.email}">
      <td><strong>${p.name || "(no name)"}</strong><br><span style="font-family:var(--mono); font-size:11px; color:var(--muted);">${p.email}</span></td>
      <td><span class="mini-bar"><span class="mini-bar-fill" style="width:${pct}%"></span></span>${completedSecs}/${totalSections}</td>
      <td><span class="status-chip ${chip}">${chipLabel}</span></td>
      <td style="font-family:var(--mono); font-size:12px;">${totalAtt}</td>
      <td style="font-family:var(--mono); font-size:12px;">${fmtTime(totalTime)}</td>
      <td style="font-family:var(--mono); font-size:11px; color:var(--muted);">${p.lastActive ? fmtDate(p.lastActive) : "—"}</td>
      <td><button class="btn-delete-row" data-email="${p.email}" data-name="${(p.name||"this member").replace(/"/g,'&quot;')}" title="Delete this member">✕</button></td>
    </tr>`;
  });

  document.getElementById("adminMain").innerHTML = `
    <div class="admin-header">
      <h1>Committee onboarding — full status</h1>
    </div>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-num">${all.length}</div><div class="stat-label">Members started</div></div>
      <div class="stat-card"><div class="stat-num">${fullyComplete}</div><div class="stat-label">Fully cleared</div></div>
      <div class="stat-card"><div class="stat-num">${inProgress}</div><div class="stat-label">In progress</div></div>
      <div class="stat-card"><div class="stat-num">${totalAttempts}</div><div class="stat-label">Total quiz attempts</div></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Member</th><th>Sections passed</th><th>Status</th><th>Attempts</th><th>Time spent</th><th>Last active</th><th></th></tr></thead>
        <tbody>${rows || `<tr><td colspan="7" style="text-align:center; color:var(--muted); padding:30px;">No members have started onboarding yet.</td></tr>`}</tbody>
      </table>
    </div>`;

  document.querySelectorAll(".member-row").forEach(row => {
    row.onclick = () => openDetail(all.find(p => p.email === row.dataset.email));
  });

  document.querySelectorAll(".btn-delete-row").forEach(btn => {
    btn.onclick = async (ev) => {
      ev.stopPropagation(); // don't trigger the row's openDetail click
      await handleDeleteMember(btn.dataset.email, btn.dataset.name);
    };
  });
}

async function handleDeleteMember(email, name){
  const confirmed = confirm(`Delete all onboarding progress for ${name} (${email})?\n\nThis permanently removes their record from the Sheet. This cannot be undone.`);
  if(!confirmed) return;
  const ok = await deleteMember(email);
  if(ok){
    closeDetail();
    renderAdminBody();
  } else {
    alert("Couldn't delete this member — check your connection and try again.");
  }
}

function openDetail(p){
  const panel = document.getElementById("detailPanel");
  const overlay = document.getElementById("detailOverlay");
  let secsHtml = "";
  SECTIONS.forEach(s => {
    const sp = p.sections[s.id];
    if(!sp){
      secsHtml += `<div class="detail-sec"><div class="detail-sec-top"><div class="detail-sec-title">${s.title}</div><span class="status-chip stuck">Not started</span></div></div>`;
      return;
    }
    const statusChip = sp.status === "complete" ? `<span class="status-chip complete">Passed</span>` : `<span class="status-chip progress">In progress</span>`;
    const lastAttempt = sp.attempts.slice(-1)[0];
    secsHtml += `
    <div class="detail-sec">
      <div class="detail-sec-top"><div class="detail-sec-title">${s.title}</div>${statusChip}</div>
      <div class="detail-meta">
        <span>Best: ${sp.bestScore}/${s.questions.length}</span>
        <span>Attempts: ${sp.attempts.length}</span>
        <span>Time: ${fmtTime(sp.timeSpentSeconds||0)}</span>
      </div>
      ${lastAttempt ? `<div class="detail-meta" style="margin-top:6px;">Last attempt: ${fmtDate(lastAttempt.ts)}</div>` : ""}
    </div>`;
  });

  panel.innerHTML = `
    <div class="detail-top-row">
      <div class="detail-close" id="detailCloseBtn">✕ Close</div>
      <button class="btn-delete-detail" id="detailDeleteBtn">Delete member</button>
    </div>
    <div class="detail-name">${p.name}</div>
    <div class="detail-email">${p.email}</div>
    ${secsHtml}`;
  document.getElementById("detailCloseBtn").onclick = closeDetail;
  document.getElementById("detailDeleteBtn").onclick = () => handleDeleteMember(p.email, p.name || "this member");
  panel.classList.add("open");
  overlay.classList.add("open");
  overlay.onclick = closeDetail;
}
function closeDetail(){
  document.getElementById("detailPanel").classList.remove("open");
  document.getElementById("detailOverlay").classList.remove("open");
}

// ---------------- Init ----------------
render();
</script>
</body>
</html>
